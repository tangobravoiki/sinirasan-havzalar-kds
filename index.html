            const fetchWithProxy = async (url, timeout = 15000) => {
  // ÇOK KATMANLI VEKİL SUNUCU MİMARİSİ (Multi-Tier Proxy Fallback Architecture)
  // CORS engellerini aşmak için 8 farklı proxy stratejisi ve yedeklilik protokolü
    // Tier 1: Doğrudan erişim (Direct access - CORS destekleyen API'ler için)
    { 
      name: 'Direct', 
      transform: (u) => u,
      parseResponse: (r) => r.json()
    },
    
    // Tier 2: AllOrigins (En güvenilir, JSON wrapper ile)
    { 
      name: 'AllOrigins', 
      transform: (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
      parseResponse: async (r) => {
        const data = await r.json();
        return data.contents ? JSON.parse(data.contents) : data;
      }
    },
    
    // Tier 3: CORS Proxy IO
    { 
      name: 'CORSProxy.io', 
      transform: (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      parseResponse: (r) => r.json()
    },
    
    // Tier 4: ThingProxy (Alternatif wrapper)
    { 
      name: 'ThingProxy', 
      transform: (u) => `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(u)}`,
      parseResponse: (r) => r.json()
    },
    
    // Tier 5: CodeTabs Proxy
    { 
      name: 'CodeTabs', 
      transform: (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
      parseResponse: (r) => r.json()
    },
    
    // Tier 6: JSONProxy (Farklı domain stratejisi)
    { 
      name: 'JSONProxy', 
      transform: (u) => `https://jsonp.afeld.me/?url=${encodeURIComponent(u)}`,
      parseResponse: (r) => r.json()
    },
    
    // Tier 7: Proxy6 (Yedek alternatif)
    { 
      name: 'Proxy6', 
      transform: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
      parseResponse: (r) => r.json()
    },
    
    // Tier 8: Son çare - yaodax proxy
    { 
      name: 'Yaodax', 
      transform: (u) => `https://yacdn.org/proxy/${encodeURIComponent(u)}`,
      parseResponse: (r) => r.json()
    }
  ];
  
  // PARALEL DENEME STRATEJİSİ: İlk 3 proxy'yi paralel dene, diğerlerini sırayla
  const parallelProxies = PROXIES.slice(0, 3);
  const sequentialProxies = PROXIES.slice(3);
  
  // Paralel deneme fonksiyonu
  const tryProxy = async (proxy) => {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeout);
    
    try {
      const proxyUrl = proxy.transform(url);
      console.log(`[KDS] Deneniyor: ${proxy.name} -> ${url.substring(0, 60)}...`);
      
      const response = await fetch(proxyUrl, { 
        signal: controller.signal,
        mode: 'cors',
        cache: 'no-cache',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        }
      });
      
      clearTimeout(timeoutId);
      
      if (response.ok) {
        const data = await proxy.parseResponse(response);
        console.log(`[KDS] ✓ Başarılı: ${proxy.name}`);
        return { success: true, data, source: proxy.name };
      } else {
        console.warn(`[KDS] ✗ HTTP ${response.status}: ${proxy.name}`);
        return { success: false, error: `HTTP ${response.status}`, source: proxy.name };
      }
    } catch (error) {
      clearTimeout(timeoutId);
      const errorMsg = error.name === 'AbortError' ? 'Timeout' : error.message;
      console.warn(`[KDS] ✗ Hata (${proxy.name}): ${errorMsg}`);
      return { success: false, error: errorMsg, source: proxy.name };
    }
  };
  
  // PHASE 1: Paralel deneme (ilk 3 proxy aynı anda)
  try {
    const parallelResults = await Promise.race(
      parallelProxies.map(proxy => tryProxy(proxy).then(result => 
        result.success ? Promise.resolve(result) : Promise.reject(result)
      ))
    );
    return parallelResults.data;
  } catch (parallelError) {
    console.warn('[KDS] Paralel denemeler başarısız, sıralı denemeye geçiliyor...');
  }
  
  // PHASE 2: Sıralı deneme (kalan proxy'ler tek tek)
  for (const proxy of sequentialProxies) {
    const result = await tryProxy(proxy);
    if (result.success) {
      return result.data;
    }
  }
  
  // TÜM PROXY'LER BAŞARISIZ - Son bir direkt deneme
  console.error(`[KDS] ✗✗✗ TÜM PROXY'LER BAŞARISIZ: ${url}`);
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeout);
    const lastTry = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    if (lastTry.ok) {
      console.log('[KDS] Son direkt deneme başarılı!');
      return await lastTry.json();
    }
  } catch (finalError) {
    console.error('[KDS] Son deneme de başarısız:', finalError.message);
  }
  
  return null; // Tüm denemeler başarısız
};
        };

                try {
                    // DÜZELTME: "Bad Request" hatasını önlemek için desteklenen güncel katmanlar (0_to_1cm, 27_to_81cm vb.) kullanılmıştır.
                    const meteoResponse = await fetchWithProxy(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&elevation=nan&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,snowfall,snow_depth,cloud_cover,surface_pressure&hourly=soil_moisture_0_to_1cm,soil_moisture_27_to_81cm,soil_moisture_81_to_255cm,soil_temperature_6cm,shortwave_radiation,vapor_pressure_deficit,runoff,et0_fao_evapotranspiration,evaporation&daily=temperature_2m_max,precipitation_sum,uv_index_max&timezone=auto`);
                    
                    if (!meteoResponse || !meteoResponse.current || !meteoResponse.hourly) {
                        throw new Error("Open-Meteo verisi geçersiz veya boş döndü.");
                    }
                    
                    // Saatlik verilerden mevcut saatin indeksini bulup güncel verilere eşitleme
                    const now = new Date();
                    let hIdx = meteoResponse.hourly.time.findIndex(t => new Date(t) >= now);
                    if (hIdx === -1) hIdx = meteoResponse.hourly.time.length - 1; // Zaman uyumsuzluğunda son veriye fallback

                    meteoResponse.current.soil_moisture_0_to_7cm = meteoResponse.hourly.soil_moisture_0_to_1cm[hIdx];
                    meteoResponse.current.soil_moisture_28_to_100cm = meteoResponse.hourly.soil_moisture_27_to_81cm[hIdx];
                    meteoResponse.current.soil_moisture_100_to_255cm = meteoResponse.hourly.soil_moisture_81_to_255cm[hIdx];
                    meteoResponse.current.soil_temperature_0_to_7cm = meteoResponse.hourly.soil_temperature_6cm[hIdx];
                    meteoResponse.current.shortwave_radiation = meteoResponse.hourly.shortwave_radiation[hIdx];
                    meteoResponse.current.vapor_pressure_deficit = meteoResponse.hourly.vapor_pressure_deficit[hIdx];
                    meteoResponse.current.runoff = meteoResponse.hourly.runoff[hIdx];
                    meteoResponse.current.et0_fao_evapotranspiration = meteoResponse.hourly.et0_fao_evapotranspiration[hIdx];
                    meteoResponse.current.evaporation_from_bare_soil = meteoResponse.hourly.evaporation[hIdx]; // Göl/Açık alan buharlaşması

                    meteoData = meteoResponse;
                } catch (error) {
                    console.warn("Open-Meteo erişimi başarısız oldu. NASA POWER Fallback API devreye giriyor...", error.message);
                    activeSource = 'NASA POWER (Fallback)';
                    
                    // NASA POWER tarih parametrelerinin son 7 günü kapsayacak şekilde hesaplanması
                    const today = new Date();
                    const startDate = new Date(today);
                    startDate.setDate(startDate.getDate() - 7);
                    
                    const formatNasaDate = (date) => {
                        return date.getFullYear() + String(date.getMonth() + 1).padStart(2, '0') + String(date.getDate()).padStart(2, '0');
                    };

                    const startStr = formatNasaDate(startDate);
                    const endStr = formatNasaDate(today);

                    try {
                        // DÜZELTME: NASA API'sinde tanımlı olmayan 'SNNOWDP' ve hatalı varyantlar çıkarılarak kararlı uç nokta oluşturulmuştur.
                        const nasaResponse = await fetchWithProxy(`https://power.larc.nasa.gov/api/temporal/daily/point?parameters=T2M,RH2M,WS10M,PRECTOTCORR,GWETTOP,GWETROOT,GWETPROF,VPD,TSOIL1,ALLSKY_SFC_SW_DWN,PS&community=AG&longitude=${lon}&latitude=${lat}&start=${startStr}&end=${endStr}&format=JSON`);
                        
                        if (nasaResponse && nasaResponse.properties && nasaResponse.properties.parameter) {
                            const p = nasaResponse.properties.parameter;
                            // NASA verisini Open-Meteo KDS standart formatına dönüştürme algoritması
                            const getLastValue = (paramObj) => {
                                if(!paramObj) return null;
                                const values = Object.values(paramObj);
                                return values[values.length - 1] !== -999 ? values[values.length - 1] : (values[values.length - 2] !== -999 ? values[values.length - 2] : null);
                            };

                            meteoData = {
                                elevation: nasaResponse.geometry?.coordinates?.[2] || "Veri Bulunamadı",
                                current: {
                                    temperature_2m: getLastValue(p.T2M),
                                    relative_humidity_2m: getLastValue(p.RH2M),
                                    wind_speed_10m: getLastValue(p.WS10M) !== null ? (getLastValue(p.WS10M) * 3.6).toFixed(1) : null, // m/s değerinden km/h formatına kalibrasyon
                                    precipitation: getLastValue(p.PRECTOTCORR),
                                    soil_moisture_0_to_7cm: getLastValue(p.GWETTOP), // Normalize endeks formatı [0-1]
                                    soil_moisture_28_to_100cm: getLastValue(p.GWETROOT),
                                    soil_moisture_100_to_255cm: getLastValue(p.GWETPROF),
                                    evaporation_from_bare_soil: null, // NASA'da buharlaşma parametresi yedeklenmedi
                                    snow_depth: null, // Tanımsız parametreler null olarak atanarak arayüzün çökmesi engellenmiştir.
                                    vapor_pressure_deficit: getLastValue(p.VPD),
                                    soil_temperature_0_to_7cm: getLastValue(p.TSOIL1),
                                    shortwave_radiation: getLastValue(p.ALLSKY_SFC_SW_DWN),
                                    surface_pressure: getLastValue(p.PS),
                                    et0_fao_evapotranspiration: null,
                                    runoff: null,
                                    cloud_cover: null,
                                    snowfall: null
                                },
                                daily: {
                                    temperature_2m_max: Object.values(p.T2M || {}).slice(-7), // 7 günlük asimptotik eğilim (trend)
                                    precipitation_sum: Object.values(p.PRECTOTCORR || {}).slice(-7),
                                    time: Object.keys(p.T2M || {}).slice(-7),
                                    uv_index_max: [null] 
                                }
                            };
                        } else {
                            throw new Error("NASA POWER verisi işlenemedi veya veri bloğu tanımsız.");
                        }
                    } catch (nasaError) {
                        console.warn("Tüm meteoroloji API'leri çöktü. KDS degrade moda geçiyor.", nasaError.message);
                        activeSource = 'VERİ BAĞLANTISI KOPTU';
                        meteoData = null; // Sistem, matematiksel çökmeyi engellemek için null veri ile degrade (zarar azaltıcı) moda geçer
                    }
                }

                // Diğer API sorgularının paralel olarak çalıştırılması
                const results = await Promise.allSettled([
                    fetchWithProxy(`https://flood-api.open-meteo.com/v1/flood?latitude=${lat}&longitude=${lon}&daily=river_discharge`),
                    fetchWithProxy(`https://firms.modaps.eosdis.nasa.gov/api/area/csv/0/MODIS_NRT/${lon-1},${lat-1},${lon+1},${lat+1}/1`),
                    ...newsSources.map(src => fetchWithProxy(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src)}`))
                ]);

                let combinedNews = [];
                results.slice(2).forEach(res => {
                    if (res.status === 'fulfilled' && res.value?.items) {
                        combinedNews = [...combinedNews, ...res.value.items];
                    }
                });
                
                const uniqueNews = Array.from(new Map(combinedNews.map(item => [item.link, item])).values())
                    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                    .slice(0, 15);

                setEnvData({
                    meteo: meteoData,
                    dataSource: activeSource,
                    flood: results[0].status === 'fulfilled' ? results[0].value : null,
                    tuik: basin.tuik_pop,
                    firms: results[1].status === 'fulfilled' ? results[1].value : null,
                    news: uniqueNews
                });
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(selectedBasin); }, [selectedBasin, fetchData]);

            useEffect(() => {
                if (!mapInstance.current) {
                    const container = document.getElementById('map');
                    if (container) {
                        mapInstance.current = L.map('map', { zoomControl: false, attributionControl: false }).setView([selectedBasin.lat, selectedBasin.lon], 5);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
                    }
                }
                if (mapInstance.current) {
                    markersRef.current.forEach(m => mapInstance.current.removeLayer(m));
                    markersRef.current = BASIN_CONSTANTS.map(b => {
                        const isActive = b.name === selectedBasin.name;
                        const activeColor = isDarkMode ? '#2dd4bf' : '#0d9488';
                        const inactiveColor = isDarkMode ? '#1e293b' : '#94a3b8';
                        const borderColor = isDarkMode ? '#ffffff' : '#0f172a';
                        
                        const m = L.circleMarker([b.lat, b.lon], {
                            radius: isActive ? 12 : 7,
                            fillColor: isActive ? activeColor : inactiveColor,
                            color: borderColor, 
                            weight: 1.5, 
                            fillOpacity: 0.9
                        }).addTo(mapInstance.current);
                        m.on('click', () => setSelectedBasin(b));
                        return m;
                    });
                    mapInstance.current.flyTo([selectedBasin.lat, selectedBasin.lon], 6);
                }
            }, [selectedBasin, isDarkMode]);

            const analytics = useMemo(() => {
                const b = selectedBasin;
                const w = b.wef;
                const n = b.nato;
                const supplyBase = Math.max(1, w.Supply);
                let dynFreq = w.freq || 0.5;
                if (envData.meteo?.current?.soil_moisture_0_to_7cm != null && envData.meteo.current.soil_moisture_0_to_7cm < 0.25) {
                    dynFreq += 0.2;
                }
                const rsi = clamp((w.Demand / supplyBase) * (1 - w.Cr) * (1 + w.alpha * dynFreq));
                const currentTemp = envData.meteo?.current?.temperature_2m || 25;
                const vClim = clamp(currentTemp / 45);

                let blrSum = 0;
                Object.entries(sandboxBLR).forEach(([k, v]) => {
                    const weight = n.omega[k] || 0;
                    blrSum += weight * (1 - v);
                });

                const thermalPenalty = envData.firms ? 0.05 : 0; 
                const newsPenalty = Math.min(0.20, (envData.news?.length || 0) * 0.02);

                const structuralComponent = blrSum * 0.40;
                const operationalRisk = (n.eta[0] * vClim) + (n.eta[1] * 0.32) + (n.eta[2] * rsi);
                const operationalComponent = operationalRisk * 0.60;
                const vNato = clamp(structuralComponent + operationalComponent + newsPenalty + thermalPenalty);

                return { vNato, rsi, vClim, newsPenalty, blrSum, thermalPenalty };
            }, [envData, selectedBasin, sandboxBLR]);

            useEffect(() => {
                const score = analytics?.vNato || 0;
                setAlertLevel(score >= 0.75 ? 'KRITIK' : score >= 0.5 ? 'UYARI' : 'NORMAL');
            }, [analytics]);

            const handleSandboxChange = (key, value) => {
                setSandboxBLR(prev => ({ ...prev, [key]: parseFloat(value) }));
            };

            const exportReport = (format) => {
                const timestamp = new Date().toISOString();
                const formattedDate = new Date().toLocaleString('tr-TR');
                
                const snowDepthData = envData?.meteo?.current?.snow_depth;
                const snowFallData = envData?.meteo?.current?.snowfall;
                const snowDataVal = snowDepthData !== undefined && snowDepthData !== null ? (snowDepthData * 100).toFixed(1) : (snowFallData !== undefined && snowFallData !== null ? snowFallData : "Veri Bulunamadı");

                if (format === 'json') {
                    const reportData = {
                        timestamp: timestamp,
                        basin: selectedBasin.name,
                        risk_assessment: {
                            vNato_score: analytics?.vNato.toFixed(4),
                            alert_level: alertLevel,
                            rsi_stress: analytics?.rsi.toFixed(3),
                            climate_risk: analytics?.vClim.toFixed(3),
                            structural_vulnerability: analytics?.blrSum.toFixed(3)
                        },
                        environmental_parameters: {
                            temperature_c: envData?.meteo?.current?.temperature_2m ?? "Veri Bulunamadı",
                            relative_humidity_pct: envData?.meteo?.current?.relative_humidity_2m ?? "Veri Bulunamadı",
                            vapor_pressure_deficit_kpa: envData?.meteo?.current?.vapor_pressure_deficit ?? "Veri Bulunamadı",
                            wind_speed_kmh: envData?.meteo?.current?.wind_speed_10m ?? "Veri Bulunamadı",
                            cloud_cover_pct: envData?.meteo?.current?.cloud_cover ?? "Veri Bulunamadı",
                            surface_pressure_hpa: envData?.meteo?.current?.surface_pressure ?? "Veri Bulunamadı",
                            elevation_m: envData?.meteo?.elevation ?? "Veri Bulunamadı",
                            soil_temperature_c: envData?.meteo?.current?.soil_temperature_0_to_7cm ?? "Veri Bulunamadı",
                            surface_soil_moisture_pct: envData?.meteo?.current?.soil_moisture_0_to_7cm != null ? (envData.meteo.current.soil_moisture_0_to_7cm * 100).toFixed(1) : "Veri Bulunamadı",
                            root_zone_soil_moisture_pct: envData?.meteo?.current?.soil_moisture_28_to_100cm != null ? (envData.meteo.current.soil_moisture_28_to_100cm * 100).toFixed(1) : "Veri Bulunamadı",
                            deep_soil_moisture_pct: envData?.meteo?.current?.soil_moisture_100_to_255cm != null ? (envData.meteo.current.soil_moisture_100_to_255cm * 100).toFixed(1) : "Veri Bulunamadı",
                            shortwave_radiation_wm2: envData?.meteo?.current?.shortwave_radiation ?? "Veri Bulunamadı",
                            uv_index_max: envData?.meteo?.daily?.uv_index_max?.[0] ?? "Veri Bulunamadı",
                            surface_runoff_mm: envData?.meteo?.current?.runoff ?? "Veri Bulunamadı",
                            river_discharge_m3s: envData?.flood?.daily?.river_discharge?.[0] ?? "Veri Bulunamadı",
                            evapotranspiration_mm: envData?.meteo?.current?.et0_fao_evapotranspiration ?? "Veri Bulunamadı",
                            open_water_evaporation_mm: envData?.meteo?.current?.evaporation_from_bare_soil ?? "Veri Bulunamadı",
                            snow_data_cm: snowDataVal,
                            population_million: envData?.tuik ?? "Veri Bulunamadı"
                        },
                        simulated_nato_blr: sandboxBLR
                    };

                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(reportData, null, 2));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", `KDS_Rapor_${selectedBasin.code}_${new Date().getTime()}.json`);
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                } else if (format === 'txt') {
                    let txtContent = `SINIRAŞAN HAVZALAR KDS - OPERASYONEL RAPOR\n`;
                    txtContent += `==========================================\n`;
                    txtContent += `Tarih: ${formattedDate}\n`;
                    txtContent += `Havza: ${selectedBasin.name} (${selectedBasin.code})\n\n`;
                    txtContent += `[RİSK ANALİZİ]\n`;
                    txtContent += `- Bütünleşik Risk Skoru (vNato): ${analytics?.vNato.toFixed(4)}\n`;
                    txtContent += `- Sistem Eşik Durumu: ${alertLevel}\n`;
                    txtContent += `- Su Stresi (RSI): ${analytics?.rsi.toFixed(3)}\n`;
                    txtContent += `- İklim Riski Katsayısı: ${analytics?.vClim.toFixed(3)}\n`;
                    txtContent += `- Yapısal Zafiyet Skoru: ${analytics?.blrSum.toFixed(3)}\n\n`;
                    txtContent += `[HİDRO-METEOROLOJİK PARAMETRELER]\n`;
                    txtContent += `- Havza Referans Rakımı: ${envData?.meteo?.elevation ?? 'Veri Bulunamadı'} m\n`;
                    txtContent += `- Güncel Sıcaklık: ${envData?.meteo?.current?.temperature_2m ?? 'Veri Bulunamadı'} °C\n`;
                    txtContent += `- Bağıl Nem: ${envData?.meteo?.current?.relative_humidity_2m != null ? envData.meteo.current.relative_humidity_2m + ' %' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Buhar Basıncı Açığı (VPD): ${envData?.meteo?.current?.vapor_pressure_deficit != null ? envData.meteo.current.vapor_pressure_deficit + ' kPa' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Rüzgâr Hızı: ${envData?.meteo?.current?.wind_speed_10m != null ? envData.meteo.current.wind_speed_10m + ' km/h' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Bulut Örtüsü: ${envData?.meteo?.current?.cloud_cover != null ? envData.meteo.current.cloud_cover + ' %' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Yüzey Basıncı: ${envData?.meteo?.current?.surface_pressure != null ? envData.meteo.current.surface_pressure + ' hPa' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Toprak Sıcaklığı: ${envData?.meteo?.current?.soil_temperature_0_to_7cm ?? 'Veri Bulunamadı'} °C\n`;
                    txtContent += `- Yüzeysel Nem (0-7cm): ${envData?.meteo?.current?.soil_moisture_0_to_7cm != null ? (envData.meteo.current.soil_moisture_0_to_7cm * 100).toFixed(1) : 'Veri Bulunamadı'} %\n`;
                    txtContent += `- Kök Bölgesi Nemi (28-100cm): ${envData?.meteo?.current?.soil_moisture_28_to_100cm != null ? (envData.meteo.current.soil_moisture_28_to_100cm * 100).toFixed(1) : 'Veri Bulunamadı'} %\n`;
                    txtContent += `- Derin Toprak Nemi (100-255cm): ${envData?.meteo?.current?.soil_moisture_100_to_255cm != null ? (envData.meteo.current.soil_moisture_100_to_255cm * 100).toFixed(1) : 'Veri Bulunamadı'} %\n`;
                    txtContent += `- Güneş Radyasyonu: ${envData?.meteo?.current?.shortwave_radiation != null ? envData.meteo.current.shortwave_radiation + ' W/m²' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Maksimum UV İndeksi: ${envData?.meteo?.daily?.uv_index_max?.[0] != null ? envData.meteo.daily.uv_index_max[0] : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Yüzey Akışı (Runoff): ${envData?.meteo?.current?.runoff != null ? envData.meteo.current.runoff + ' mm' : 'Veri Bulunamadı'}\n`;
                    txtContent += `- Günlük Nehir Debisi: ${envData?.flood?.daily?.river_discharge?.[0] ?? 'Veri Bulunamadı'} m³/s\n`;
                    txtContent += `- Buharlaşma/Terleme (ET0): ${envData?.meteo?.current?.et0_fao_evapotranspiration ?? 'Veri Bulunamadı'} mm\n`;
                    txtContent += `- Göl/Baraj Buharlaşması: ${envData?.meteo?.current?.evaporation_from_bare_soil ?? 'Veri Bulunamadı'} mm\n`;
                    txtContent += `- Kar Kalınlığı/Yağışı: ${snowDataVal} cm\n`;
                    txtContent += `- Nüfus (TÜİK): ${envData?.tuik ?? 'Veri Bulunamadı'} Milyon\n\n`;
                    txtContent += `[SİMÜLE EDİLEN NATO 7BLR (DİRENÇ) PARAMETRELERİ]\n`;
                    Object.entries(sandboxBLR).forEach(([k, v]) => {
                        txtContent += `- ${k}: ${v.toFixed(2)}\n`;
                    });
                    txtContent += `\n==========================================\n`;
                    txtContent += `Üretilen rapor tamamen açık kaynak istihbarat (OSINT) ve hidro-meteorolojik projeksiyon sistemlerinin anlık verilerine dayanmaktadır.\n`;

                    const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(txtContent);
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", `KDS_Rapor_${selectedBasin.code}_${new Date().getTime()}.txt`);
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                }
            };

            return React.createElement('div', { className: 'min-h-screen p-4 md:p-8 space-y-8 max-w-screen-2xl mx-auto' },
                React.createElement('header', { 
                    className: 'flex flex-col lg:flex-row items-start lg:items-center justify-between gap-6',
                    title: 'Sistemin genel tanımlaması ve operasyonel versiyon bilgisi.'
                },
                    React.createElement('div', { className: 'space-y-1' },
                        React.createElement('h1', { className: 'text-3xl font-bold tracking-tighter text-accent', title: 'Sınıraşan Havzalar Karar Destek Sistemi Ana Başlığı' }, 'SINIRAŞAN HAVZALAR'),
                        React.createElement('div', { className: 'flex items-center gap-3 text-xs text-secondary tracking-widest uppercase', title: 'NATO 7 Temel Gereksinim (7BLR) çerçevesinde çalışan matematiksel analiz motoru.' },
                            React.createElement('span', null, 'KARAR DESTEK SİSTEMİ')
                        )
                    ),
                    React.createElement('div', { className: 'panel p-1.5 flex flex-col sm:flex-row items-stretch gap-2 w-full lg:w-auto', title: 'Analiz edilecek hidropolitik havzanın seçildiği operasyonel kontrol modülü.' },
                        React.createElement('div', { className: 'relative flex gap-2' },
                            React.createElement('select', { 
                                className: 'custom-select bg-panel-alt border border-main text-sm font-medium px-4 py-3 pr-10 outline-none hover:border-accent transition-all cursor-pointer text-primary min-w-[200px]',
                                value: selectedBasin.name,
                                onChange: (e) => setSelectedBasin(BASIN_CONSTANTS.find(x => x.name === e.target.value)),
                                title: 'Sistem kütüphanesindeki stratejik havzalar arasında geçiş yapınız.'
                            }, BASIN_CONSTANTS.map(b => React.createElement('option', { key: b.name, value: b.name }, b.name))),
                            React.createElement('div', { className: 'flex gap-1' },
                                React.createElement('button', {
                                    onClick: () => setIsDarkMode(!isDarkMode),
                                    className: 'bg-panel-alt border border-main text-xs font-medium px-3 py-3 outline-none hover:border-accent hover:text-accent transition-all cursor-pointer text-secondary',
                                    title: 'Gece ve Gündüz modu arasında geçiş yap.'
                                }, isDarkMode ? 'GÜNDÜZ ☀️' : 'GECE 🌙'),
                                React.createElement('button', {
                                    onClick: () => setShowMethodology(true),
                                    className: 'bg-panel-alt border border-main text-xs font-medium px-3 py-3 outline-none hover:border-accent hover:text-accent transition-all cursor-pointer text-secondary',
                                    title: 'Sistemin matematiksel altyapısını ve hesaplama yöntemlerini göster.'
                                }, 'METODOLOJİ'),
                                React.createElement('button', {
                                    onClick: () => setShowDataSources(true),
                                    className: 'bg-panel-alt border border-main text-xs font-medium px-3 py-3 outline-none hover:border-accent hover:text-accent transition-all cursor-pointer text-secondary',
                                    title: 'Sistemde kullanılan API ve açık kaynak istihbarat veri setlerini göster.'
                                }, 'VERİ KAYNAKLARI'),
                                React.createElement('button', {
                                    onClick: () => exportReport('json'),
                                    className: 'bg-panel-alt border border-main text-xs font-medium px-3 py-3 outline-none hover:border-accent hover:text-accent transition-all cursor-pointer text-secondary',
                                    title: 'Mevcut analitik durumu JSON formatında dışa aktar.'
                                }, 'JSON'),
                                React.createElement('button', {
                                    onClick: () => exportReport('txt'),
                                    className: 'bg-panel-alt border border-main text-xs font-medium px-3 py-3 outline-none hover:border-accent hover:text-accent transition-all cursor-pointer text-secondary',
                                    title: 'Mevcut analitik durumu Düz Metin (TXT) formatında dışa aktar.'
                                }, 'TXT')
                            )
                        )
                    )
                ),

        const fetchWithProxy = async (url, timeout = 15000) => {
            const PROXIES = [
                (u) => u,
                (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
                (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`
            ];
            for (const proxyFn of PROXIES) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(proxyFn(url), { signal: controller.signal });
                    if (response.ok) {
                        const data = await response.json();
                        clearTimeout(id);
                        return data.contents ? JSON.parse(data.contents) : data;
                    }
                } catch (e) { clearTimeout(id); continue; }
            }
            return null;
        };

                                )

                ),

                React.createElement('footer', {

                        React.createElement('li', null, 'UNESCO. (2023). United Nations world water development report: Partnerships and cooperation for water. UN-Water.')

        }

                        { no: "5.2", baslik: "Yıllara Göre Arazi Toplulaştırma, 1961-2024", url: "https://cdniys.tarimorman.gov.tr/api/File/GetGaleriFile/425/DosyaGaleri/8848/5.2.yillara_gore_arazi_toplulastirma_hizmetleri_19612024.xlsx" }
                    ]
                }
            ]
        };

        const clamp = (v) => isNaN(v) ? 0 : Math.max(0, Math.min(1, v));
        
        const fetchWithProxy = async (url, timeout = 15000) => {
            const PROXIES = [
                (u) => u,
                (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
                (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`
            ];
            for (const proxyFn of PROXIES) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                try {
                    const response = await fetch(proxyFn(url), { signal: controller.signal });
                    if (response.ok) {
                        const data = await response.json();
                        clearTimeout(id);
                        return data.contents ? JSON.parse(data.contents) : data;
                    }
                } catch (e) { clearTimeout(id); continue; }
            }
            return null;
        };

        function App() {
            const [selectedBasin, setSelectedBasin] = useState(BASIN_CONSTANTS[1]);
            const [sandboxBLR, setSandboxBLR] = useState(BASIN_CONSTANTS[1].nato.blr);
            const [envData, setEnvData] = useState({ meteo: null, flood: null, tuik: null, news: [], firms: null });
            const [loading, setLoading] = useState(false);
            const [alertLevel, setAlertLevel] = useState('NORMAL');
            const [showMethodology, setShowMethodology] = useState(false);
            const [showDataSources, setShowDataSources] = useState(false);
            const mapInstance = useRef(null);
            const markersRef = useRef([]);

            useEffect(() => {
                setSandboxBLR(selectedBasin.nato.blr);
                setEnvData(prev => ({ ...prev, news: [] }));
            }, [selectedBasin]);

            const fetchData = useCallback(async (basin) => {
                setLoading(true);
                const { lat, lon, cc, keywords } = basin;
                const encodedKeys = keywords.split(' ').join('+');
                
                const newsSources = [
                    `https://reliefweb.int/updates/rss.xml?search=${encodedKeys}`,
                    `https://news.google.com/rss/search?q=${encodedKeys}&hl=en-US&gl=US&ceid=US:en`,
                    `https://www.bing.com/news/search?q=${encodedKeys}&format=rss`,
                    `https://news.search.yahoo.com/rss?p=${encodedKeys}`,
                    `https://reliefweb.int/disasters/rss.xml?search=${encodedKeys}`
                ];

                const results = await Promise.allSettled([
                    fetchWithProxy(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,soil_moisture_0_to_7cm,et0_fao_evapotranspiration,snowfall&daily=temperature_2m_max,precipitation_sum&timezone=auto`),
                    fetchWithProxy(`https://flood-api.open-meteo.com/v1/flood?latitude=${lat}&longitude=${lon}&daily=river_discharge`),
                    fetchWithProxy(`https://firms.modaps.eosdis.nasa.gov/api/area/csv/0/MODIS_NRT/${lon-1},${lat-1},${lon+1},${lat+1}/1`),
                    ...newsSources.map(src => fetchWithProxy(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(src)}`))
                ]);

                let combinedNews = [];
                results.slice(3).forEach(res => {
                    if (res.status === 'fulfilled' && res.value?.items) {
                        combinedNews = [...combinedNews, ...res.value.items];
                    }
                });
                
                const uniqueNews = Array.from(new Map(combinedNews.map(item => [item.link, item])).values())
                    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                    .slice(0, 15);

                setEnvData({
                    meteo: results[0].status === 'fulfilled' ? results[0].value : null,
                    flood: results[1].status === 'fulfilled' ? results[1].value : null,
                    tuik: basin.tuik_pop,
                    firms: results[2].status === 'fulfilled' ? results[2].value : null,
                    news: uniqueNews
                });
                setLoading(false);
            }, []);

            useEffect(() => { fetchData(selectedBasin); }, [selectedBasin, fetchData]);

            useEffect(() => {
                if (!mapInstance.current) {
                    const container = document.getElementById('map');
                    if (container) {
                        mapInstance.current = L.map('map', { zoomControl: false, attributionControl: false }).setView([selectedBasin.lat, selectedBasin.lon], 5);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
                    }
                }
                if (mapInstance.current) {
                    markersRef.current.forEach(m => mapInstance.current.removeLayer(m));
                    markersRef.current = BASIN_CONSTANTS.map(b => {
                        const isActive = b.name === selectedBasin.name;
                        const m = L.circleMarker([b.lat, b.lon], {
                            radius: isActive ? 12 : 7,
                            fillColor: isActive ? '#2dd4bf' : '#1e293b',
                            color: '#ffffff', weight: 1.5, fillOpacity: 0.9
                        }).addTo(mapInstance.current);
                        m.on('click', () => setSelectedBasin(b));
                        return m;
                    });
                    mapInstance.current.flyTo([selectedBasin.lat, selectedBasin.lon], 6);
                }
            }, [selectedBasin]);

            const analytics = useMemo(() => {
                const b = selectedBasin;
                const w = b.wef;
                const n = b.nato;
                const supplyBase = Math.max(1, w.Supply);
                let dynFreq = w.freq || 0.5;
                if (envData.meteo?.current?.soil_moisture_0_to_7cm !== undefined && envData.meteo.current.soil_moisture_0_to_7cm < 0.25) {
                    dynFreq += 0.2;
                }
                const rsi = clamp((w.Demand / supplyBase) * (1 - w.Cr) * (1 + w.alpha * dynFreq));
                const currentTemp = envData.meteo?.current?.temperature_2m || 25;
                const vClim = clamp(currentTemp / 45);

                let blrSum = 0;
                Object.entries(sandboxBLR).forEach(([k, v]) => {
                    const weight = n.omega[k] || 0;
                    blrSum += weight * (1 - v);
                });

                const thermalPenalty = envData.firms ? 0.05 : 0; 
                const newsPenalty = Math.min(0.20, (envData.news?.length || 0) * 0.02);

                const structuralComponent = blrSum * 0.40;
                const operationalRisk = (n.eta[0] * vClim) + (n.eta[1] * 0.32) + (n.eta[2] * rsi);
                const operationalComponent = operationalRisk * 0.60;
                const vNato = clamp(structuralComponent + operationalComponent + newsPenalty + thermalPenalty);

                return { vNato, rsi, vClim, newsPenalty, blrSum, thermalPenalty };
            }, [envData, selectedBasin, sandboxBLR]);

            useEffect(() => {
                const score = analytics?.vNato || 0;
                setAlertLevel(score >= 0.75 ? 'KRITIK' : score >= 0.5 ? 'UYARI' : 'NORMAL');

                    txtContent += `- İklim Riski Katsayısı: ${analytics?.vClim.toFixed(3)}\n`;
                    txtContent += `- Yapısal Zafiyet Skoru: ${analytics?.blrSum.toFixed(3)}\n\n`;
                    txtContent += `[HİDRO-METEOROLOJİK PARAMETRELER]\n`;
                    txtContent += `- Güncel Sıcaklık: ${envData?.meteo?.current?.temperature_2m ?? 'Veri Bulunamadı'} °C\n`;

                    txtContent += `[SİMÜLE EDİLEN NATO 7BLR (DİRENÇ) PARAMETRELERİ]\n`;

                    const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(txtContent);

                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", `KDS_Rapor_${selectedBasin.code}_${new Date().getTime()}.txt`);
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                }

                        React.createElement('h1', { className: 'text-3xl font-bold tracking-tighter text-accent', title: 'Sınıraşan Havzalar Karar Destek Sistemi Ana Başlığı' }, 'SINIRAŞAN HAVZALAR'),
                        React.createElement('div', { className: 'flex items-center gap-3 text-xs text-secondary tracking-widest uppercase', title: 'NATO 7 Temel Gereksinim (7BLR) çerçevesinde çalışan matematiksel analiz motoru.' },
                            React.createElement('span', null, 'KARAR DESTEK SİSTEMİ')
                        )
                    ),
                    React.createElement('div', { className: 'panel p-1.5 flex flex-col sm:flex-row items-stretch gap-2 w-full lg:w-auto', title: 'Analiz edilecek hidropolitik havzanın seçildiği operasyonel kontrol modülü.' },
                        React.createElement('div', { className: 'relative flex gap-2' },
                            React.createElement('select', { 
                                className: 'custom-select bg-panel-alt border border-main text-sm font-medium px-4 py-3 pr-10 outline-none hover:border-accent transition-all cursor-pointer text-[#000080] min-w-[200px]',
                                value: selectedBasin.name,
                                onChange: (e) => setSelectedBasin(BASIN_CONSTANTS.find(x => x.name === e.target.value)),
                                title: 'Sistem kütüphanesindeki stratejik havzalar arasında geçiş yapınız.'

                                }, 'TXT')
                            )

                showMethodology && React.createElement('div', { className: 'fixed inset-0 z-[9999] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4' },

                        React.createElement('h2', { className: 'text-xl font-bold text-accent mb-6 tracking-widest border-b border-main pb-4' }, 'SİSTEM METODOLOJİSİ VE MATEMATİKSEL ALTYAPI'),

                            React.createElement('div', { className: 'space-y-2' },
                                React.createElement('h3', { className: 'text-md font-bold text-white uppercase' }, '1. Bütünleşik Risk Skoru (vNato)'),
                                React.createElement('p', null, 'Sistemin nihai kriz göstergesi olan $vNato$ skoru, [0, 1] aralığında normalize edilmiş bir endekstir. Yapısal zafiyetlerin %40, operasyonel çevresel risklerin %60 oranında ağırlıklandırıldığı ve dışsal şokların (OSINT, Termal Anomali) cezalandırma (penalty) faktörü olarak eklendiği bir algoritma ile hesaplanır:'),
                                React.createElement('div', { className: 'bg-panel-alt p-4 rounded border border-main font-mono text-xs text-accent-bright my-2' }, 'vNato = (Yapısal_Bileşen * 0.40) + (Operasyonel_Bileşen * 0.60) + OSINT_Cezası + Termal_Ceza'),

                                React.createElement('p', null, 'Burada $C_r$, kıyıdaş devletlerin suyu geri dönüştürme ve koruma kapasitesini (kurumsal adaptasyon); $\alpha$ ise havzanın iklim değişikliğine duyarlılık katsayısını temsil eder (Gleick, 2014).')
                            ),

                                React.createElement('h3', { className: 'text-md font-bold text-white uppercase' }, '3. İklim Riski ve Termal Kat Sayılar'),

                            ),

                                    React.createElement('li', { className: 'pl-4 -indent-4' }, 'Akgün, M., & Yıldız, D. (2021). Sınıraşan sular ve hidropolitik: Türkiye örneği. Su Politikaları Derneği Yayınları.'),
                                    React.createElement('li', { className: 'pl-4 -indent-4' }, 'Altingoz, M., Belinskij, A., Bréthaut, C., do Ó, A., Gevinian, S., Hearns, G., Keskinen, M., McCracken, M., Ni, V., Solninen, N., & Wolf, A. T. (2018). Promoting Development in Shared River Basins: Case Studies from International Experience. World Bank. https://doi.org/10.1596/29449'),

                )

        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
